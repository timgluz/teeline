name: teeline-web

"on":
  push:
    branches: [master]
    paths:
      - 'teeline-web/**'
      - '.github/workflows/teeline-web.yml'
  pull_request:
    branches: [master]
    paths:
      - 'teeline-web/**'
      - '.github/workflows/teeline-web.yml'

defaults:
  run:
    working-directory: teeline-web

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: teeline-web/package-lock.json

      - name: Install Rust toolchain + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install cargo-component
        run: cargo install cargo-component --locked

      - name: Build WASM component
        working-directory: teeline-wasm
        run: cargo component build --target wasm32-wasip1

      - name: Transpile WASM to JS bindings (jco)
        working-directory: teeline-web
        run: npx --yes @bytecodealliance/jco@1.20.0 transpile ../teeline-wasm/target/wasm32-wasip1/debug/teeline_wasm.wasm --name teeline_wasm -o ../teeline-wasm/js-bindings

      - name: Install dependencies
        run: npm ci

      - name: Lint (tsc)
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build:check
