# This file was autogenerated by dist: https://axodotdev.github.io/cargo-dist
#
# Copyright 2022-2024, axodotdev
# SPDX-License-Identifier: MIT or Apache-2.0
#
# CI that:
#
# * checks for a Git Tag that looks like a release
# * builds artifacts with dist (archives, installers, hashes)
# * uploads those artifacts to temporary workflow zip
# * on success, uploads the artifacts to a GitHub Release
#
# Note that the GitHub Release will be created with a generated
# title/body based on your changelogs.

name: Release
permissions:
  "contents": "write"

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
on:
  pull_request:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

jobs:
  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }}
      publishing: ${{ !github.event.pull_request }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        # we specify bash to get pipefail; it guards against the `curl` command
        # failing. otherwise `sh` won't catch that `curl` returned non-0
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh | sh"
      - name: Cache dist
        uses: actions/upload-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      # sure would be cool if github gave us proper conditionals...
      # so here's a doubly-nested ternary-via-truthiness to try to provide the best possible
      # functionality based on whether this is a pull_request, and whether it's from a fork.
      # (PRs run on the *source* but secrets are usually on the *target* -- that's *good*
      # but also really annoying to build CI around when it needs secrets to work right.)
      - id: plan
        run: |
          dist ${{ (!github.event.pull_request && format('host --steps=create --tag={0}', github.ref_name)) || 'plan' }} --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts
    # Let the initial task tell us to not run (currently very blunt)
    needs:
      - plan
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist-args: cli flags to pass to dist
      # - install-dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Build artifacts
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        run: |
          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v8
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output ".upload_files[]" dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}
  # Build the WASM component (teeline-wasm) and attach it to the release
  build-wasm-artifact:
    needs:
      - plan
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust wasm32-wasip1 target
        run: rustup target add wasm32-wasip1
      - name: Install cargo-component
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-component
      - name: Build WASM component (release)
        run: cargo component build --manifest-path teeline-wasm/Cargo.toml --release
      - name: Package WASM artifact
        run: |
          mkdir -p target/distrib
          cp target/wasm32-wasip1/release/teeline_wasm.wasm target/distrib/teeline-solver.wasm
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-build-wasm
          path: target/distrib/teeline-solver.wasm

  # Determines if we should publish/announce
  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
      - build-wasm-artifact
    # Only run if we're "publishing", and only if plan, local and global didn't fail (skipped is fine)
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') && (needs.build-wasm-artifact.result == 'skipped' || needs.build-wasm-artifact.result == 'success') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v8
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Fetch artifacts from scratch-storage
      - name: Fetch artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: host
        shell: bash
        run: |
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "artifacts uploaded and released successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v7
        with:
          # Overwrite the previous copy
          name: artifacts-dist-manifest
          path: dist-manifest.json
      # Create a GitHub Release while uploading all files to it
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup
        run: |
          # Remove the granular manifests
          rm -f artifacts/*-dist-manifest.json
      - name: Create GitHub Release
        env:
          PRERELEASE_FLAG: "${{ fromJson(steps.host.outputs.manifest).announcement_is_prerelease && '--prerelease' || '' }}"
          ANNOUNCEMENT_TITLE: "${{ fromJson(steps.host.outputs.manifest).announcement_title }}"
          ANNOUNCEMENT_BODY: "${{ fromJson(steps.host.outputs.manifest).announcement_github_body }}"
          RELEASE_COMMIT: "${{ github.sha }}"
        run: |
          # Write and read notes from a file to avoid quoting breaking things
          echo "$ANNOUNCEMENT_BODY" > $RUNNER_TEMP/notes.txt

          gh release create "${{ needs.plan.outputs.tag }}" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt" artifacts/*

  announce:
    needs:
      - plan
      - host
    # use "always() && ..." to allow us to wait for all publish jobs while
    # still allowing individual publish jobs to skip themselves (for prereleases).
    # "host" however must run to completion, no skipping allowed!
    if: ${{ always() && needs.host.result == 'success' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

  # --- Qt platform builds (issue #119) ---
  # These jobs run in parallel with the cargo-dist platform builds, then
  # upload their artifacts to the same GitHub Release after 'host' creates it.

  build-qt-linux:
    needs:
      - plan
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      QT_VERSION: '6.11.0'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: desktop
          arch: linux_gcc_64
          cache: true
          extra: '--base https://download.qt.io/'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglib2.0-dev libfuse2
      - name: Build teeline-qt
        run: cargo build --release --manifest-path teeline-qt/Cargo.toml
      - name: Download linuxdeploy
        run: |
          wget -nv https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -nv https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
      - name: Create AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp teeline-qt/target/release/teeline-qt AppDir/usr/bin/
          cat > AppDir/teeline-qt.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Teeline Qt
          Exec=teeline-qt
          Icon=teeline-qt
          Categories=Science;Education;
          DESKTOP
          cp AppDir/teeline-qt.desktop AppDir/usr/share/applications/
          # Generate a 256×256 placeholder icon using Python stdlib (no extra deps)
          python3 - << 'PYEOF'
          import struct, zlib
          def png_chunk(name, data):
              crc = zlib.crc32(name + data) & 0xffffffff
              return struct.pack('>I', len(data)) + name + data + struct.pack('>I', crc)
          w, h = 256, 256
          sig = b'\x89PNG\r\n\x1a\n'
          ihdr = png_chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
          row = b'\x00' + b'\x2a\x82\xda' * w   # filter byte + blue RGB
          idat = png_chunk(b'IDAT', zlib.compress(row * h))
          iend = png_chunk(b'IEND', b'')
          with open('AppDir/usr/share/icons/hicolor/256x256/apps/teeline-qt.png', 'wb') as f:
              f.write(sig + ihdr + idat + iend)
          PYEOF
      - name: Package AppImage
        env:
          QMLPATHS: ${{ github.workspace }}/teeline-qt/src
          LD_LIBRARY_PATH: ${{ env.QT_ROOT_DIR }}/lib
        run: |
          ./linuxdeploy-x86_64.AppImage --appdir=AppDir --plugin qt --output appimage
          # linuxdeploy names the file using the desktop entry Name + arch
          mv Teeline_Qt-x86_64.AppImage "teeline-qt-${{ needs.plan.outputs.tag }}-linux-x86_64.AppImage"
      - uses: actions/upload-artifact@v7
        with:
          name: qt-linux
          path: teeline-qt-*-linux-x86_64.AppImage
          if-no-files-found: error

  build-qt-windows:
    needs:
      - plan
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      QT_VERSION: '6.11.0'
    steps:
      - name: Configure long paths
        run: git config --global core.longpaths true
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true
          extra: '--base https://download.qt.io/'
      - name: Build teeline-qt
        run: cargo build --release --manifest-path teeline-qt/Cargo.toml
      - name: Deploy Qt dependencies
        shell: pwsh
        run: |
          $windeployqt = "${{ env.QT_ROOT_DIR }}\bin\windeployqt.exe"
          & $windeployqt --release --compiler-runtime --qmldir teeline-qt\src --dir deploy teeline-qt\target\release\teeline-qt.exe
          Copy-Item teeline-qt\target\release\teeline-qt.exe deploy\
      - name: Package zip
        shell: pwsh
        run: |
          $tag = "${{ needs.plan.outputs.tag }}"
          $name = "teeline-qt-${tag}-windows-x64"
          Rename-Item deploy $name
          Compress-Archive -Path $name -DestinationPath "${name}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: qt-windows
          path: teeline-qt-*-windows-x64.zip
          if-no-files-found: error

  build-qt-macos:
    needs:
      - plan
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    continue-on-error: true
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      QT_VERSION: '6.11.0'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          cache: true
          extra: '--base https://download.qt.io/'
      - name: Build teeline-qt
        run: cargo build --release --manifest-path teeline-qt/Cargo.toml
      - name: Create .app bundle
        run: |
          mkdir -p TeelineQt.app/Contents/MacOS
          mkdir -p TeelineQt.app/Contents/Resources
          cp teeline-qt/target/release/teeline-qt TeelineQt.app/Contents/MacOS/
          cat > TeelineQt.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>teeline-qt</string>
            <key>CFBundleIdentifier</key>
            <string>com.timgluz.teeline-qt</string>
            <key>CFBundleName</key>
            <string>TeelineQt</string>
            <key>CFBundleDisplayName</key>
            <string>Teeline Qt</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
          </dict>
          </plist>
          EOF
      - name: Deploy Qt frameworks and create DMG
        run: |
          macdeployqt TeelineQt.app -always-overwrite -qmldir=teeline-qt/src
          codesign --force --deep -s - TeelineQt.app
          hdiutil create \
            -volname "Teeline Qt" \
            -srcfolder TeelineQt.app \
            -ov -format UDZO \
            "teeline-qt-${{ needs.plan.outputs.tag }}-macos-arm64.dmg"
      - uses: actions/upload-artifact@v7
        with:
          name: qt-macos
          path: teeline-qt-*-macos-arm64.dmg
          if-no-files-found: error

  upload-qt-artifacts:
    needs:
      - plan
      - host
      - build-qt-linux
      - build-qt-windows
      - build-qt-macos
    if: ${{ always() && needs.host.result == 'success' && needs.build-qt-linux.result == 'success' && needs.build-qt-windows.result == 'success' }}
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: qt-linux
          path: artifacts/
      - uses: actions/download-artifact@v8
        with:
          name: qt-windows
          path: artifacts/
      - uses: actions/download-artifact@v8
        if: ${{ needs.build-qt-macos.result == 'success' }}
        with:
          name: qt-macos
          path: artifacts/
      - name: Attach Qt artifacts to GitHub Release
        run: gh release upload "${{ needs.plan.outputs.tag }}" artifacts/* --repo "${{ github.repository }}"

  publish-wassette:
    needs: [plan]
    if: needs.plan.outputs.publishing == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32-wasip2 target
        run: rustup target add wasm32-wasip2

      - name: Install cargo-component
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-component

      - name: Build wasip2 component
        run: |
          cargo component build \
            --manifest-path teeline-wasm/Cargo.toml \
            --target wasm32-wasip2 \
            --release
          cp target/wasm32-wasip2/release/teeline_wasm.wasm teeline-solver-wassette.wasm

      - name: Install ORAS
        uses: oras-project/setup-oras@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          oras push ghcr.io/timgluz/teeline/wassette:latest \
            --artifact-type application/wasm \
            teeline-solver-wassette.wasm:application/wasm

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            oras push "ghcr.io/timgluz/teeline/wassette:${GITHUB_REF_NAME}" \
              --artifact-type application/wasm \
              teeline-solver-wassette.wasm:application/wasm
          fi
