name: Rust

"on":
  push:
    branches: [master]
    paths-ignore:
      - 'teeline-web/**'
      - 'teeline-api/**'
      - 'teeline-qt/**'
      - 'teeline-wasm/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'teeline-web/**'
      - 'teeline-api/**'
      - 'teeline-qt/**'
      - 'teeline-wasm/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Build
        run: cargo build -p teeline -p teeline-cli --verbose
      - name: Run tests
        run: cargo test -p teeline -p teeline-cli --verbose
      - name: Run e2e tests (BATS)
        run: ./tests/bats/bin/bats tests/e2e/
      - name: Clippy
        run: cargo clippy -p teeline -p teeline-cli -- -D warnings
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage
        run: cargo llvm-cov -p teeline -p teeline-cli --lcov --output-path lcov.info
      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          flags: core
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
