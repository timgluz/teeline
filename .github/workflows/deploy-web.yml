name: deploy-web

on:
  push:
    branches: [master]
    paths: ['teeline-web/**']

permissions:
  contents: read

defaults:
  run:
    working-directory: teeline-web

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: teeline-web/package-lock.json

      - name: Download WASM component from latest release
        run: |
          mkdir -p ../teeline-wasm/js-bindings
          gh release download --repo "$GITHUB_REPOSITORY" --pattern 'teeline-solver.wasm' --output ../teeline-wasm/teeline-solver.wasm "$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName')"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Transpile WASM to JS bindings (jco)
        run: npx --yes @bytecodealliance/jco@1.20.0 transpile ../teeline-wasm/teeline-solver.wasm -o ../teeline-wasm/js-bindings

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist/
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
