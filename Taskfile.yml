version: "3"

includes:
  qt:
    taskfile: ./teeline-qt/Taskfile.yml
    dir: ./teeline-qt

tasks:
  build:
    desc: Compile debug binary (teeline-cli)
    cmds:
      - cargo build -p teeline-cli

  build:release:
    desc: Compile optimised binary (teeline-cli)
    cmds:
      - cargo build -p teeline-cli --release

  build:wasm:
    desc: Build WASM component (requires cargo-component and wasm32-wasip2 target)
    cmds:
      - cargo component build --manifest-path teeline-wasm/Cargo.toml --target wasm32-wasip2

  test:
    desc: Run all unit and integration tests
    cmds:
      - cargo test

  test:verbose:
    desc: Run tests with captured output
    cmds:
      - cargo test -- --nocapture

  test:e2e:
    desc: Run BATS end-to-end tests (requires debug binary)
    deps: [build]
    cmds:
      - ./tests/bats/bin/bats tests/e2e/

  build:api:
    desc: Compile debug binary (teeline-api)
    cmds:
      - cargo build -p teeline-api

  api:_launch:
    internal: true
    desc: "(internal) Launch teeline-api in the background; shared by api:serve, test:e2e:api, test:e2e:auth"
    vars:
      API_KEY: '{{.API_KEY | default ""}}'
      RATE_LIMIT_RPM: '{{.RATE_LIMIT_RPM | default ""}}'
    # Values are threaded through as opaque env vars (never interpolated
    # into the bash -c string itself) so a token containing a quote or
    # `$(...)` can't break out and inject commands — same reasoning as the
    # TEST_API_TOKEN handling in test:e2e:auth below.
    env:
      TASK_API_KEY: '{{.API_KEY}}'
      TASK_RATE_LIMIT_RPM: '{{.RATE_LIMIT_RPM}}'
    cmds:
      # go-task's bundled shell interpreter doesn't preserve backgrounded
      # processes past the end of the task run, and mis-captures $!.
      # bash -c ... & disown bypasses it so the server actually survives.
      - bash -c 'API_KEY="$TASK_API_KEY" RATE_LIMIT_RPM="$TASK_RATE_LIMIT_RPM" nohup ./target/debug/teeline-api >/tmp/teeline-api.log 2>&1 & echo $! > /tmp/teeline-api.pid; disown'

  api:serve:
    desc: Start teeline-api server in background (writes PID to /tmp/teeline-api.pid)
    cmds:
      - task: api:_launch

  # NOTE: api:serve, test:e2e:api, and test:e2e:auth all share the single
  # /tmp/teeline-api.pid file. This is only safe because they're never run
  # concurrently (CI runs the two e2e tasks as separate sequential steps).
  # Running two of these at the same time would let the second one's PID
  # write clobber the first's, and api:stop could then kill the wrong server.
  api:stop:
    desc: Stop the background teeline-api server (kills by PID file and any stale instances)
    cmds:
      - kill $(cat /tmp/teeline-api.pid) 2>/dev/null || true
      - pkill -f target/debug/teeline-api 2>/dev/null || true

  api:wait:
    desc: Poll until teeline-api health endpoint is ready (max 10s)
    cmds:
      - for i in $(seq 10); do curl -sf http://127.0.0.1:8080/api/v1/health && break || sleep 1; done

  test:e2e:api:
    desc: Build, start, wait, run hurl e2e tests, then shut down teeline-api
    deps: [build:api]
    cmds:
      - defer:
          task: api:stop
      - task: api:_launch
        vars:
          RATE_LIMIT_RPM: "0"
      - task: api:wait
      - hurl --test teeline-api/tests/hurl/*.hurl

  test:e2e:auth:
    desc: Build, start with API_KEY set, wait, run hurl auth e2e tests, then shut down teeline-api
    deps: [build:api]
    vars:
      API_TOKEN: test-secret-token
    # Passed as a real env var (not interpolated into the hurl command
    # below) so the token's value is never re-parsed as shell syntax —
    # {{.API_TOKEN}} directly inline would let a value containing a quote
    # or `$(...)` break out and inject commands.
    env:
      TEST_API_TOKEN: '{{.API_TOKEN}}'
    cmds:
      - defer:
          task: api:stop
      - task: api:_launch
        vars:
          API_KEY: "{{.API_TOKEN}}"
          RATE_LIMIT_RPM: "0"
      - task: api:wait
      - hurl --test --variable api_token="$TEST_API_TOKEN" teeline-api/tests/hurl/auth/*.hurl

  test:all:
    desc: Run unit tests and e2e tests
    deps: [test, test:e2e]

  lint:
    desc: Run Clippy (warnings are errors)
    cmds:
      - cargo clippy -- -D warnings

  lint:fix:
    desc: Apply automatic Clippy fixes
    cmds:
      - cargo clippy --fix -- -D warnings

  fmt:
    desc: Format code with rustfmt
    cmds:
      - cargo fmt

  fmt:check:
    desc: Check formatting without modifying files (used in CI)
    cmds:
      - cargo fmt -- --check

  check:
    desc: Run build + test + lint + fmt:check (mirrors CI)
    deps: [build, test, lint, fmt:check]

  run:
    desc: Run solver (e.g. task run -- solve nn -i tests/fixtures/berlin52.tsp)
    cmds:
      - cargo run -p teeline-cli -- {{.CLI_ARGS}}

  bench:berlin52:
    desc: Run approximate solvers on berlin52 and compare tour lengths (optimal 7542)
    deps: [build:release]
    cmds:
      - echo "=== berlin52 (optimal 7542) ==="
      - for solver in $(./target/release/teeline solvers --heuristic --short); do printf "%-12s " $solver; ./target/release/teeline solve $solver -i tests/fixtures/berlin52.tsp 2>/dev/null | head -1; done

  completions:bash:
    desc: Print bash completion script (eval in .bashrc or pipe to a file)
    deps: [build]
    cmds:
      - ./target/debug/teeline --usage-spec | usage generate completion -f - bash teeline

  completions:zsh:
    desc: Print zsh completion script (eval in .zshrc or pipe to ~/.zsh/completions/_teeline)
    deps: [build]
    cmds:
      - ./target/debug/teeline --usage-spec | usage generate completion -f - zsh teeline

  completions:fish:
    desc: Print fish completion script (source or pipe to ~/.config/fish/completions/teeline.fish)
    deps: [build]
    cmds:
      - ./target/debug/teeline --usage-spec | usage generate completion -f - fish teeline
  setup:
    desc: Configure local dev environment (install git hooks)
    cmds:
      - bash scripts/setup-hooks.sh

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean
