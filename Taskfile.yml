version: "3"

includes:
  qt:
    taskfile: ./teeline-qt/Taskfile.yml
    dir: ./teeline-qt

tasks:
  build:
    desc: Compile debug binary (teeline-cli)
    cmds:
      - cargo build -p teeline-cli

  build:release:
    desc: Compile optimised binary (teeline-cli)
    cmds:
      - cargo build -p teeline-cli --release

  build:wasm:
    desc: Build WASM component (requires cargo-component and wasm32-wasip2 target)
    cmds:
      - cargo component build --manifest-path teeline-wasm/Cargo.toml --target wasm32-wasip2

  test:
    desc: Run all unit and integration tests
    cmds:
      - cargo test

  test:verbose:
    desc: Run tests with captured output
    cmds:
      - cargo test -- --nocapture

  test:e2e:
    desc: Run BATS end-to-end tests (requires debug binary)
    deps: [build]
    cmds:
      - ./tests/bats/bin/bats tests/e2e/

  build:api:
    desc: Compile debug binary (teeline-api)
    cmds:
      - cargo build -p teeline-api

  api:serve:
    desc: Start teeline-api server in background (writes PID to /tmp/teeline-api.pid)
    cmds:
      - ./target/debug/teeline-api & echo $! > /tmp/teeline-api.pid

  api:stop:
    desc: Stop the background teeline-api server (kills by PID file and any stale instances)
    cmds:
      - kill $(cat /tmp/teeline-api.pid) 2>/dev/null || true
      - pkill -f target/debug/teeline-api 2>/dev/null || true

  api:wait:
    desc: Poll until teeline-api health endpoint is ready (max 10s)
    cmds:
      - for i in $(seq 10); do curl -sf http://127.0.0.1:8080/api/v1/health && break || sleep 1; done

  test:e2e:api:
    desc: Build, start, wait, run hurl e2e tests, then shut down teeline-api
    deps: [build:api]
    cmds:
      - defer: kill $(cat /tmp/teeline-api.pid) 2>/dev/null || true
      - task: api:serve
      - task: api:wait
      - hurl --test teeline-api/tests/hurl/*.hurl

  test:all:
    desc: Run unit tests and e2e tests
    deps: [test, test:e2e]

  lint:
    desc: Run Clippy (warnings are errors)
    cmds:
      - cargo clippy -- -D warnings

  lint:fix:
    desc: Apply automatic Clippy fixes
    cmds:
      - cargo clippy --fix -- -D warnings

  fmt:
    desc: Format code with rustfmt
    cmds:
      - cargo fmt

  fmt:check:
    desc: Check formatting without modifying files (used in CI)
    cmds:
      - cargo fmt -- --check

  check:
    desc: Run build + test + lint + fmt:check (mirrors CI)
    deps: [build, test, lint, fmt:check]

  run:
    desc: Run solver (e.g. task run -- solve nn -i tests/fixtures/berlin52.tsp)
    cmds:
      - cargo run -p teeline-cli -- {{.CLI_ARGS}}

  bench:berlin52:
    desc: Run approximate solvers on berlin52 and compare tour lengths (optimal 7542)
    deps: [build:release]
    cmds:
      - echo "=== berlin52 (optimal 7542) ==="
      - for solver in $(./target/release/teeline solvers --heuristic --short); do printf "%-12s " $solver; ./target/release/teeline solve $solver -i tests/fixtures/berlin52.tsp 2>/dev/null | head -1; done

  completions:bash:
    desc: Print bash completion script (eval in .bashrc or pipe to a file)
    deps: [build]
    cmds:
      - ./target/debug/teeline --usage-spec | usage generate completion -f - bash teeline

  completions:zsh:
    desc: Print zsh completion script (eval in .zshrc or pipe to ~/.zsh/completions/_teeline)
    deps: [build]
    cmds:
      - ./target/debug/teeline --usage-spec | usage generate completion -f - zsh teeline

  completions:fish:
    desc: Print fish completion script (source or pipe to ~/.config/fish/completions/teeline.fish)
    deps: [build]
    cmds:
      - ./target/debug/teeline --usage-spec | usage generate completion -f - fish teeline
  setup:
    desc: Configure local dev environment (install git hooks)
    cmds:
      - bash scripts/setup-hooks.sh

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean
