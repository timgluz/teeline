[package]
name = "teeline"
version = "0.3.0"
authors = ["Timo Sulg <timgluz@gmail.com>"]
edition = "2021"

[lib]
name = "teeline"
path = "src/lib.rs"

[[bin]]
name = "bin"
path = "src/main.rs"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
clap = "4.6.1"
rand = "0.9"
regex = "1.12.3"
eframe = { version = "0.33", features = ["x11", "wayland"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
