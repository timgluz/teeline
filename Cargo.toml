[workspace]
members = [".", "teeline-wasm"]
default-members = ["."]
resolver = "2"

[package]
name = "teeline"
version = "0.3.0"
authors = ["Timo Sulg <timgluz@gmail.com>"]
edition = "2021"

[lib]
name = "teeline"
path = "src/lib.rs"

[[bin]]
name = "bin"
path = "src/main.rs"
required-features = ["gui"]

[features]
default = ["gui"]
gui = ["dep:eframe"]

[dependencies]
clap = "4.6.1"
rand = "0.9"
regex = "1.12.3"
eframe = { version = "0.33", features = ["x11", "wayland"], optional = true }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
wasmtime = { version = "27", features = ["component-model"] }
wasmtime-wasi = "27"
